<!DOCTYPE html>
<html>
<head>
    <title>RSCO Attendance</title>
    <meta name="apple-mobile-web-app-title" content="RSCO">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=RSCO&background=007bff&color=fff&size=512&font-size=0.35&bold=true">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #2c3e50; color: white; }
        #qrcode { padding: 20px; background: white; border-radius: 15px; }
        #timer { margin-top: 20px; font-size: 14px; color: #bdc3c7; }
        .logo-text { font-size: 24px; font-weight: bold; margin-bottom: 20px; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="logo-text">RSCO TERMINAL</div>
    <div id="qrcode"></div>
    <div id="timer">Refreshing in 30s...</div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXdzjhlliJT8dsvwM5meI4fdA4uFW2SW_b13AkSz3hwg2TgADABOvxd_9oHzHHeepU5Q/exec"; 
        const SECRET = "RSCO_SECURE_2026";

        function generateQR() {
            const ts = Math.floor(Date.now() / 1000);
            const token = btoa(SECRET + "|" + ts);
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: SCRIPT_URL + "?token=" + token, width: 250, height: 250 });
        }
        setInterval(generateQR, 30000); 
        generateQR();
    </script>
</body>
</html>
