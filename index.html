<script>
    // PASTE YOUR NEW DEPLOYMENT URL HERE
    const SCRIPT_URL = "https://script.google.com/macros/s/XXXXX/exec"; 
    const SECRET = "RSCO_SECURE_2026";

    function generateQR() {
        const ts = Math.floor(Date.now() / 1000);
        // We use the same SECRET|TS format your script expects
        const token = btoa(SECRET + "|" + ts);
        
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { 
            text: SCRIPT_URL + "?token=" + encodeURIComponent(token), 
            width: 280, 
            height: 280 
        });
    }
    
    // Refresh every 30 seconds
    setInterval(generateQR, 30000); 
    generateQR();
</script>
