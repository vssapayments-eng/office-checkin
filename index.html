<!DOCTYPE html>
<html>
<head>
    <title>RS & Co. - Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ddd; }
        button { background: #2c3e50; color: white; font-weight: bold; cursor: pointer; }
        .audit-note { font-size: 0.8em; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Admin Punch (Field/Audit)</h2>
        <p class="audit-note">Use this for Bank or Company Audits only.</p>
        <input type="text" id="adminPass" placeholder="Enter Admin Password">
        <hr>
        <input type="text" id="targetEmp" placeholder="Employee Name">
        <select id="punchType">
            <option value="Morning Login">Morning Login</option>
            <option value="Morning Logout">Morning Logout</option>
            <option value="Afternoon Login">Afternoon Login</option>
            <option value="Afternoon Logout">Afternoon Logout</option>
        </select>
        <button onclick="submitAdminPunch()">Submit Official Punch</button>
    </div>

    <script>
        function submitAdminPunch() {
            const pass = document.getElementById('adminPass').value;
            if(pass !== "RSCO_2024") { // Change this to your preferred password
                alert("Incorrect Admin Password");
                return;
            }

            fetch('YOUR_GOOGLE_WEB_APP_URL', {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    employeeName: document.getElementById('targetEmp').value,
                    type: document.getElementById('punchType').value,
                    isAdmin: true,
                    deviceId: "ADMIN_DEVICE"
                })
            }).then(() => alert("Punch recorded successfully for " + document.getElementById('targetEmp').value));
        }
    </script>
</body>
</html>
