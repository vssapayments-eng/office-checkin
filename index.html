<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body style="text-align:center; font-family: sans-serif; background: #222; color: white; padding-top: 50px;">
    <h2>Office Attendance - Scan QR</h2>
    <div style="background: white; display: inline-block; padding: 20px; border-radius: 10px;">
        <canvas id="qr"></canvas>
    </div>
    <h3 id="timer">New QR in 30s</h3>

    <script>
        const SECRET = "123"; 
        const BASE_URL = "https://script.google.com/macros/s/AKfycbxNv1xTUFFqhBpmcQQnQZ-hWW42dLxB3x4WqWgEeMKXD278feyXoV3J2zuJ1ZCOpwfW/exec?";

        function generateQR() {
            const timeBlock = Math.floor(Date.now() / 30000);
            const hash = CryptoJS.HmacSHA256(timeBlock.toString(), SECRET);
            const token = CryptoJS.enc.Base64.stringify(hash);
            
            new QRious({
                element: document.getElementById('qr'),
                value: `${BASE_URL}?token=${encodeURIComponent(token)}`,
                size: 350
            });
            console.log("Token Generated: " + token);
        }

        let timeLeft = 30;
        setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                generateQR();
                timeLeft = 30;
            }
            document.getElementById('timer').innerText = `Refreshing in ${timeLeft}s`;
        }, 1000);

        generateQR();
    </script>
</body>
</html>
