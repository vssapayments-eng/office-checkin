<!DOCTYPE html>
<html>
<head>
    <title>RSCO</title>
    <meta name="apple-mobile-web-app-title" content="RSCO">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=RS&background=007bff&color=fff&size=512&font-size=0.4&bold=true">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #2c3e50; color: white; }
        #qrcode { padding: 25px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { font-size: 28px; font-weight: bold; margin-bottom: 20px; letter-spacing: 5px; color: #ecf0f1; }
        #timer { margin-top: 20px; font-size: 14px; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="logo">RSCO TERMINAL</div>
    <div id="qrcode"></div>
    <div id="timer">New QR in 30s...</div>

    <script>
        // REPLACE THIS WITH YOUR NEW WEB APP URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyLTFqZ-p2xai37OWdOO3q5ywAERhlM43h6mC6CjT-aVTteeQliXRUq7ncIhTvd_AO_VA/exec"; 
        const SECRET = "RSCO_SECURE_2026";

        function generateQR() {
            const ts = Math.floor(Date.now() / 1000);
            const token = btoa(SECRET + "|" + ts);
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { 
                text: SCRIPT_URL + "?token=" + token, 
                width: 280, 
                height: 280 
            });
        }
        setInterval(generateQR, 30000); 
        generateQR();
    </script>
</body>
</html>
