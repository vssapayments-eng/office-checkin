<!DOCTYPE html>
<html>
<head>
    <title>RS & Co. Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: auto; }
        .btn { padding: 15px; margin: 10px; width: 80%; font-size: 16px; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>RS & Co. Punch Station</h2>
    <div id="reader"></div>
    <select id="punchType" class="btn">
        <option value="Morning Login">Morning Login (9:30-10:30)</option>
        <option value="Morning Logout">Morning Logout (1:30-3:30)</option>
        <option value="Afternoon Login">Afternoon Login (3:00-3:30)</option>
        <option value="Afternoon Logout">Evening Logout (6:30+)</option>
    </select>
    <input type="text" id="empName" placeholder="Enter Name" class="btn">
    
    <script>
        // Unique Device ID Generation/Retrieval
        let deviceId = localStorage.getItem('rs_device_id');
        if (!deviceId) {
            deviceId = 'DEV-' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('rs_device_id', deviceId);
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Validate if QR is current (Check 30-sec hash here if needed)
            fetch('YOUR_GOOGLE_WEB_APP_URL', {
                method: 'POST',
                body: JSON.stringify({
                    employeeName: document.getElementById('empName').value,
                    deviceId: deviceId,
                    type: document.getElementById('punchType').value,
                    qrToken: decodedText
                })
            }).then(res => res.text()).then(msg => alert(msg));
        }

        let html5QrcodeScanner = new html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
