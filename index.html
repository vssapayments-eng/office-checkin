<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body style="text-align:center; font-family:sans-serif; background:#f0f0f0; padding-top:50px;">
    <h2>Office Attendance</h2>
    <canvas id="qr"></canvas>
    <p>QR refreshes every 30 seconds</p>

    <script>
        // PASTE YOUR NEW /exec URL HERE
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyVO2OOuZG_E68wor84MHH4fT5bVZPhmgTsNldN-82qQNvY6dyGQ4RhziICWFKd_ZFTVw/exec"; 

        function updateQR() {
            const now = Date.now();
            // We create a simple link: SCRIPT_URL?token=TIMESTAMP
            const qrLink = SCRIPT_URL + "?token=" + now;
            
            new QRious({
                element: document.getElementById('qr'),
                value: qrLink,
                size: 300
            });
        }

        setInterval(updateQR, 30000);
        updateQR();
    </script>
</body>
</html>
