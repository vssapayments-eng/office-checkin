<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body style="text-align:center; font-family:sans-serif;">
    <div id="setup" style="display:none; padding:20px;">
        <h3>First Time Setup</h3>
        <input type="text" id="myId" placeholder="Enter Employee ID">
        <button onclick="saveId()">Save ID</button>
    </div>

    <div id="main">
        <p>Logged in as: <b id="showId"></b></p>
        <div id="reader" style="width:300px; margin:auto;"></div>
        <p id="msg">Scan the office QR code</p>
    </div>

    <script>
        const savedId = localStorage.getItem('empId');
        // Unique ID for this specific phone
        const devId = localStorage.getItem('devId') || "PH-" + Math.floor(Math.random()*1000000);
        localStorage.setItem('devId', devId);

        if (!savedId) {
            document.getElementById('setup').style.display = 'block';
            document.getElementById('main').style.display = 'none';
        } else {
            document.getElementById('showId').innerText = savedId;
            const scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
                document.getElementById('msg').innerText = "Processing...";
                
                // decodedText is ".../exec?token=12345"
                // We just add "&id=EMP&did=PHONE" to the end
                const finalUrl = decodedText + "&id=" + savedId + "&did=" + devId;

                fetch(finalUrl)
                    .then(r => r.text())
                    .then(t => { alert(t); location.reload(); })
                    .catch(e => alert("Network Error. Check internet."));
            });
        }

        function saveId() {
            const val = document.getElementById('myId').value.trim();
            if (val) { localStorage.setItem('empId', val); location.reload(); }
        }
    </script>
</body>
</html>
