<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 10px; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="setup" style="display:none;">
        <h3>Enter Employee ID</h3>
        <input type="text" id="eid" style="padding:10px;"><button onclick="save()" style="padding:10px;">Save</button>
    </div>
    <div id="app">
        <p>ID: <strong id="disp"></strong></p>
        <div id="reader"></div>
        <p id="status">Ready to scan...</p>
    </div>

    <script>
        let eid = localStorage.getItem('eid');
        let did = localStorage.getItem('did') || 'D-' + Math.random().toString(36).substr(2,9);
        localStorage.setItem('did', did);

        if(!eid) {
            document.getElementById('setup').style.display='block';
            document.getElementById('app').style.display='none';
        } else {
            document.getElementById('disp').innerText = eid;
            startScanner();
        }

        function save() {
            localStorage.setItem('eid', document.getElementById('eid').value);
            location.reload();
        }

        function startScanner() {
    const scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (qrUrl) => {
        // Stop scanning once a code is found to prevent multiple rapid requests
        scanner.stop(); 
        
        document.getElementById('status').innerText = "Verifying...";
        
        // Ensure qrUrl from the monitor already contains the ?token=XYZ part
        // We append the Employee ID and Device ID using &
        const finalUrl = `${qrUrl}&id=${encodeURIComponent(eid)}&did=${encodeURIComponent(did)}`;

        console.log("Requesting: " + finalUrl); // For debugging in mobile console

        fetch(finalUrl)
            .then(r => r.text())
            .then(txt => {
                alert(txt);
                document.getElementById('status').innerText = txt;
                // Restart scanner after 3 seconds so they can scan again if needed
                setTimeout(() => { location.reload(); }, 3000); 
            })
            .catch(e => {
                alert("Network Error: Ensure your Apps Script is deployed to 'Anyone'");
                location.reload();
            });
    });
}
    </script>
</body>
</html>
